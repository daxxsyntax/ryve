name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  workgraph-hygiene:
    name: Workgraph hygiene (no tracked sparks.db)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse tracked sparks.db / sidecars
        run: ./scripts/check-sparks-db-not-tracked.sh

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev
      - run: cargo check --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            build-essential autoconf automake libevent-dev libncurses-dev \
            bison pkg-config
      # Build the vendored tmux so the hand_spawn integration tests run
      # against the production tmux binary (the same one that ships with
      # Ryve). Without this, those tests skip via the bundled-tmux gate
      # in src/hand_spawn.rs because the runner's system tmux on Ubuntu
      # exhibits behaviour the production path is not hardened against
      # (intermittent SessionNotFound on pipe-pane immediately after
      # new-session).
      - name: Build vendored tmux
        run: ./scripts/build-vendored-tmux.sh
      - run: cargo test --workspace

  bundled-tmux:
    name: Bundled tmux builds and runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake libevent-dev libncurses-dev bison pkg-config
      - name: Build vendored tmux
        run: ./scripts/build-vendored-tmux.sh
      - name: Verify bundled tmux version
        run: |
          EXPECTED="$(tr -d '[:space:]' < vendor/tmux/VERSION)"
          ACTUAL="$(vendor/tmux/bin/tmux -V | sed 's/^tmux //')"
          echo "Expected: tmux $EXPECTED"
          echo "Actual:   tmux $ACTUAL"
          test "$ACTUAL" = "$EXPECTED"
